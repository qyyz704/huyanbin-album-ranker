<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专辑对决 · 排名生成器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#f3ede2;
    --bg:#161119;
    --bg-2:#1f1826;
    --card:#241c2e;
    --card-hover:#2f2438;
    --gold:#d8a84e;
    --gold-dim:#8a6f3c;
    --coral:#e8654f;
    --line:rgba(243,237,226,0.12);
    --muted:rgba(243,237,226,0.55);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 10%, rgba(216,168,78,0.08), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(232,101,79,0.08), transparent 45%),
      var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
  }
  .stage{
    width:100%;
    max-width:920px;
    position:relative;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:600;
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
  }
  .eyebrow::before{
    content:'';
    width:22px;height:22px;
    border-radius:50%;
    background:
      radial-gradient(circle at center, var(--bg) 0 3px, transparent 3.5px),
      repeating-radial-gradient(circle at center, var(--gold-dim) 0 1px, transparent 1px 3px);
    flex-shrink:0;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:clamp(28px,5vw,44px);
    line-height:1.1;
    margin:0 0 8px;
    letter-spacing:-0.01em;
  }
  .sub{
    color:var(--muted);
    font-size:15px;
    line-height:1.6;
    max-width:560px;
    margin:0 0 32px;
  }

  /* ---------- SETUP ---------- */
  .panel{
    background:var(--bg-2);
    border:1px solid var(--line);
    border-radius:20px;
    padding:32px;
  }
  label{
    display:block;
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:600;
    margin-bottom:8px;
  }
  input[type=text], textarea{
    width:100%;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    color:var(--ink);
    font-family:'Inter',sans-serif;
    font-size:15px;
    padding:14px 16px;
    outline:none;
    transition:border-color .15s ease;
  }
  input[type=text]:focus, textarea:focus{border-color:var(--gold-dim);}
  textarea{resize:vertical;min-height:160px;line-height:1.8;}
  .field{margin-bottom:22px;}
  .hint{font-size:12.5px;color:var(--muted);margin-top:6px;}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;justify-content:space-between;}
  .count-pill{
    font-size:12.5px;color:var(--muted);
    background:var(--card);
    border:1px solid var(--line);
    padding:5px 12px;
    border-radius:999px;
  }
  button{
    font-family:'Inter',sans-serif;
    cursor:pointer;
    border:none;
  }
  .btn-primary{
    background:var(--gold);
    color:#241a0a;
    font-weight:700;
    font-size:15px;
    padding:14px 28px;
    border-radius:12px;
    letter-spacing:0.01em;
    transition:transform .12s ease, filter .12s ease;
  }
  .btn-primary:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-1px);}
  .btn-primary:disabled{opacity:0.35;cursor:not-allowed;}
  .btn-ghost{
    background:transparent;
    color:var(--muted);
    font-size:14px;
    padding:10px 16px;
    border-radius:10px;
    border:1px solid var(--line);
    transition:color .12s ease, border-color .12s ease;
  }
  .btn-ghost:hover{color:var(--ink);border-color:var(--gold-dim);}

  /* ---------- BATTLE ---------- */
  .battle-wrap{display:none;}
  .progress-track{
    height:4px;background:var(--line);
    border-radius:99px;overflow:hidden;margin-bottom:36px;
  }
  .progress-fill{
    height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));
    width:0%;transition:width .35s ease;
  }
  .versus-row{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    gap:20px;
    align-items:center;
  }
  .vs-mark{
    font-family:'Fraunces',serif;
    font-style:italic;
    font-weight:500;
    font-size:22px;
    color:var(--coral);
    width:48px;text-align:center;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:40px 24px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    min-height:260px;
    cursor:pointer;
    transition:background .15s ease, border-color .15s ease, transform .15s ease;
    position:relative;
    overflow:hidden;
  }
  .card:hover{background:var(--card-hover);border-color:var(--gold-dim);transform:translateY(-2px);}
  .card.chosen{border-color:var(--gold);background:var(--card-hover);}
  .card.fading{opacity:0;transform:scale(0.97);}
  .card-key{
    position:absolute;top:14px;left:16px;
    font-size:11px;color:var(--muted);
    letter-spacing:0.08em;
    border:1px solid var(--line);
    padding:2px 8px;border-radius:99px;
  }
  .disc{
    width:56px;height:56px;border-radius:50%;
    background:
      radial-gradient(circle at center, var(--bg-2) 0 8px, transparent 8.5px),
      repeating-radial-gradient(circle at center, var(--gold-dim) 0 1.5px, transparent 1.5px 4px);
    margin-bottom:18px;
    flex-shrink:0;
  }
  .cover{
    width:148px;height:148px;
    border-radius:10px;
    object-fit:cover;
    margin-bottom:18px;
    flex-shrink:0;
    box-shadow:0 12px 28px rgba(0,0,0,0.35);
    border:1px solid var(--line);
  }
  .result-cover{
    width:44px;height:44px;
    border-radius:6px;
    object-fit:cover;
    flex-shrink:0;
    border:1px solid var(--line);
  }
  .result-cover-placeholder{
    width:44px;height:44px;
    border-radius:6px;
    flex-shrink:0;
    background:
      radial-gradient(circle at center, var(--bg-2) 0 5px, transparent 5.5px),
      repeating-radial-gradient(circle at center, var(--gold-dim) 0 1px, transparent 1px 3px);
  }
  .card-title{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:21px;
    line-height:1.25;
  }
  .battle-foot{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:24px;font-size:12.5px;color:var(--muted);
  }

  /* ---------- RESULTS ---------- */
  .results-wrap{display:none;}
  .result-row{
    display:flex;align-items:center;gap:18px;
    padding:16px 20px;
    background:var(--bg-2);
    border:1px solid var(--line);
    border-radius:14px;
    margin-bottom:10px;
    animation:rise .4s ease backwards;
  }
  .result-row.top1{border-color:var(--gold);background:linear-gradient(90deg, rgba(216,168,78,0.14), var(--bg-2));}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .rank-num{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:22px;
    color:var(--gold-dim);
    width:42px;flex-shrink:0;
  }
  .top1 .rank-num{color:var(--gold);}
  .result-title{font-size:16px;font-weight:600;flex:1;}
  .result-actions{display:flex;gap:12px;margin-top:28px;}
  @media (max-width:640px){
    .versus-row{grid-template-columns:1fr;}
    .vs-mark{margin:0 auto;}
    .panel{padding:22px;}
  }
</style>
</head>

        <div class="hint">至少填 3 张专辑。想加封面图,格式写成「专辑名 | 图片链接」,竖线前后随意加空格都行;不填图片也没关系,会用默认图标。</div>
      </div>
      <div class="row">
        <span class="count-pill" id="countPill">0 张专辑</span>
        <button class="btn-primary" id="startBtn" disabled>开始对决</button>
      </div>
    </div>
  </div>

  <!-- BATTLE -->
  <div class="battle-wrap" id="battle">
    <div class="eyebrow" id="battleEyebrow">专辑对决</div>
    <h1 id="battleTitle">选一个更喜欢的</h1>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="versus-row">
      <div class="card" id="cardLeft" tabindex="0">
        <span class="card-key">←</span>
        <div class="disc" id="discLeft"></div>
        <img class="cover" id="coverLeft" style="display:none;" alt="">
        <div class="card-title" id="titleLeft"></div>
      </div>
      <div class="vs-mark">VS</div>
      <div class="card" id="cardRight" tabindex="0">
        <span class="card-key">→</span>
        <div class="disc" id="discRight"></div>
        <img class="cover" id="coverRight" style="display:none;" alt="">
        <div class="card-title" id="titleRight"></div>
      </div>
    </div>
    <div class="battle-foot">
      <span id="progressLabel"></span>
      <span>可用键盘 ← → 快速选择</span>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="results-wrap" id="results">
    <div class="eyebrow">最终排名</div>
    <h1 id="resultsTitle">排名出炉</h1>
    <p class="sub" id="resultsSub"></p>
    <div id="resultsList"></div>
    <div class="result-actions">
      <button class="btn-primary" id="copyBtn">复制排名文字</button>
      <button class="btn-ghost" id="restartBtn">重新开始</button>
    </div>
  </div>

</div>

<script>
(function(){
  const setupEl = document.getElementById('setup');
  const battleEl = document.getElementById('battle');
  const resultsEl = document.getElementById('results');

  const artistInput = document.getElementById('artist');
  const albumsInput = document.getElementById('albums');
  const countPill = document.getElementById('countPill');
  const startBtn = document.getElementById('startBtn');

  const battleEyebrow = document.getElementById('battleEyebrow');
  const cardLeft = document.getElementById('cardLeft');
  const cardRight = document.getElementById('cardRight');
  const titleLeft = document.getElementById('titleLeft');
  const titleRight = document.getElementById('titleRight');
  const discLeft = document.getElementById('discLeft');
  const discRight = document.getElementById('discRight');
  const coverLeft = document.getElementById('coverLeft');
  const coverRight = document.getElementById('coverRight');
  const progressFill = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');

  const resultsTitle = document.getElementById('resultsTitle');
  const resultsSub = document.getElementById('resultsSub');
  const resultsList = document.getElementById('resultsList');
  const copyBtn = document.getElementById('copyBtn');
  const restartBtn = document.getElementById('restartBtn');

  function parseAlbumLine(line){
    const parts = line.split('|');
    const title = parts[0].trim();
    const cover = parts.length > 1 ? parts.slice(1).join('|').trim() : '';
    return { title, cover };
  }

  function updateCount(){
    const lines = albumsInput.value.split('\n').map(s=>s.trim()).filter(Boolean);
    countPill.textContent = lines.length + ' 张专辑';
    startBtn.disabled = lines.length < 3;
  }
  albumsInput.addEventListener('input', updateCount);
  updateCount();

  // ---- comparison bookkeeping ----
  let totalComparisons = 0;
  let doneComparisons = 0;
  let currentResolve = null;
  let artistName = '';

  function estimateComparisons(n){
    if(n<=1) return 0;
    // approximate n*log2(n) - n + 1, typical for merge sort
    return Math.max(1, Math.ceil(n*Math.log2(n) - n + 1));
  }

  function setCard(titleEl, discEl, coverEl, item){
    titleEl.textContent = item.title;
    if(item.cover){
      coverEl.src = item.cover;
      coverEl.style.display = 'block';
      discEl.style.display = 'none';
      coverEl.onerror = ()=>{ coverEl.style.display='none'; discEl.style.display='block'; };
    } else {
      coverEl.style.display = 'none';
      discEl.style.display = 'block';
    }
  }

  function compare(a, b){
    return new Promise(resolve=>{
      setCard(titleLeft, discLeft, coverLeft, a);
      setCard(titleRight, discRight, coverRight, b);
      cardLeft.classList.remove('fading','chosen');
      cardRight.classList.remove('fading','chosen');
      currentResolve = (choice)=>{
        currentResolve = null;
        doneComparisons++;
        const pct = Math.min(96, Math.round((doneComparisons/totalComparisons)*100));
        progressFill.style.width = pct + '%';
        progressLabel.textContent = '已比较 ' + doneComparisons + ' 次';
        resolve(choice);
      };
    });
  }

  function pick(side){
    if(!currentResolve) return;
    const chosenCard = side==='left'?cardLeft:cardRight;
    const otherCard = side==='left'?cardRight:cardLeft;
    chosenCard.classList.add('chosen');
    otherCard.classList.add('fading');
    const r = currentResolve;
    setTimeout(()=>{ r(side); }, 140);
  }

  cardLeft.addEventListener('click', ()=>pick('left'));
  cardRight.addEventListener('click', ()=>pick('right'));
  document.addEventListener('keydown', (e)=>{
    if(battleEl.style.display==='none') return;
    if(e.key==='ArrowLeft') pick('left');
    if(e.key==='ArrowRight') pick('right');
  });

  // ---- async merge sort, higher preference = smaller index (rank 1) ----
  async function mergeSort(arr){
    if(arr.length<=1) return arr;
    const mid = Math.floor(arr.length/2);
    const left = await mergeSort(arr.slice(0,mid));
    const right = await mergeSort(arr.slice(mid));
    return await merge(left,right);
  }

  async function merge(left,right){
    const result=[];
    let i=0,j=0;
    while(i<left.length && j<right.length){
      const choice = await compare(left[i], right[j]);
      if(choice==='left'){ result.push(left[i]); i++; }
      else { result.push(right[j]); j++; }
    }
    while(i<left.length) result.push(left[i++]);
    while(j<right.length) result.push(right[j++]);
    return result;
  }

  async function startGame(){
    artistName = artistInput.value.trim();
    const lines = albumsInput.value.split('\n').map(s=>s.trim()).filter(Boolean);
    const parsed = lines.map(parseAlbumLine);
    const seen = new Set();
    const uniqueAlbums = [];
    parsed.forEach(item=>{
      if(!seen.has(item.title)){ seen.add(item.title); uniqueAlbums.push(item); }
    });

    setupEl.style.display='none';
    battleEl.style.display='block';
    resultsEl.style.display='none';

    battleEyebrow.textContent = artistName ? artistName + ' · 专辑对决' : '专辑对决';
    doneComparisons = 0;
    totalComparisons = estimateComparisons(uniqueAlbums.length);
    progressFill.style.width='0%';
    progressLabel.textContent = '已比较 0 次';

    const ranked = await mergeSort(uniqueAlbums);
    showResults(ranked);
  }

  function showResults(ranked){
    battleEl.style.display='none';
    resultsEl.style.display='block';
    progressFill.style.width='100%';

    resultsTitle.textContent = artistName ? artistName + ' 专辑排名' : '专辑排名';
    resultsSub.textContent = '一共比较了 ' + doneComparisons + ' 次,以下是属于你的最终结果。';

    resultsList.innerHTML='';
    ranked.forEach((item, idx)=>{
      const row=document.createElement('div');
      row.className='result-row' + (idx===0?' top1':'');
      row.style.animationDelay = (idx*0.045)+'s';
      const coverHtml = item.cover
        ? '<img class="result-cover" src="'+escapeHtml(item.cover)+'" alt="" onerror="this.outerHTML=\'<div class=&quot;result-cover-placeholder&quot;></div>\'">'
        : '<div class="result-cover-placeholder"></div>';
      row.innerHTML = '<div class="rank-num">'+(idx+1)+'</div>'+coverHtml+'<div class="result-title">'+escapeHtml(item.title)+'</div>';
      resultsList.appendChild(row);
    });
  }

  function escapeHtml(str){
    const d=document.createElement('div');
    d.textContent=str;
    return d.innerHTML;
  }

  startBtn.addEventListener('click', startGame);

  copyBtn.addEventListener('click', ()=>{
    const rows = [...resultsList.querySelectorAll('.result-row')];
    const text = (artistName? artistName+' 专辑排名\n' : '专辑排名\n') +
      rows.map((r,i)=> (i+1)+'. '+r.querySelector('.result-title').textContent).join('\n');
    if(navigator.clipboard){
      navigator.clipboard.writeText(text).then(()=>{
        copyBtn.textContent='已复制!';
        setTimeout(()=>copyBtn.textContent='复制排名文字',1400);
      }).catch(()=>{ fallbackCopy(text); });
    } else {
      fallbackCopy(text);
    }
  });

  function fallbackCopy(text){
    const ta=document.createElement('textarea');
    ta.value=text; document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); copyBtn.textContent='已复制!'; setTimeout(()=>copyBtn.textContent='复制排名文字',1400); }catch(e){}
    document.body.removeChild(ta);
  }

  restartBtn.addEventListener('click', ()=>{
    resultsEl.style.display='none';
    setupEl.style.display='block';
  });

})();
</script>
</body>
</html>
